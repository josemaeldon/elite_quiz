name: Publish GHCR images

on:
  push:
    branches: [ main ]

env:
  GHCR_OWNER: ${{ github.repository_owner }}
  TAG: ${{ github.sha }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build & push admin image
        uses: docker/build-push-action@v5
        with:
          context: ./elite_quiz_admin
          file: ./elite_quiz_admin/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.GHCR_OWNER }}/elite-quiz-admin:latest
            ghcr.io/${{ env.GHCR_OWNER }}/elite-quiz-admin:${{ env.TAG }}

      - name: Build & push web image
        uses: docker/build-push-action@v5
        with:
          context: ./elite_quiz_web
          file: ./elite_quiz_web/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.GHCR_OWNER }}/elite-quiz-web:latest
            ghcr.io/${{ env.GHCR_OWNER }}/elite-quiz-web:${{ env.TAG }}
